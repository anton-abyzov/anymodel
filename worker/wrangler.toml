name = "anymodel-proxy"
main = "index.mjs"
compatibility_date = "2024-12-01"

workers_dev = true
routes = [
  { pattern = "api.anymodel.dev/*", zone_id = "cea2ba6aacd5a00a032eb83d86badcd8" }
]

[vars]
FREE_ONLY = "true"
RPM = "60"
DEFAULT_FREE_MODEL = "nvidia/nemotron-3-super-120b-a12b:free"

# Secrets (set via `wrangler secret put`):
# OPENROUTER_API_KEY
# ANYMODEL_TOKEN
